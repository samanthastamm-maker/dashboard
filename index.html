<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truehold · Deal Risk Dashboard</title>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=sentient@400,400i,700,700i&f[]=roobert@300,400,500,600&display=swap">
<style>
:root {
  --primary-500:#c4cfcc;--primary-400:#e8eceb;--primary-300:#f3f5f5;--primary-200:#f8f9f9;
  --primary-100:#fafbfb;--green-action-800:#488577;--green-action-300:#bee8ce;
  --white:#ffffff;--gray-800:#3a3a3a;--gray-400:#a3a3a3;--gray-300:#dddbda;
  --hero-bg:#214037;--dark-green:#03261c;
  --bg:var(--primary-400);--bg2:var(--primary-300);--surface:var(--white);--surface2:var(--primary-200);
  --border:rgba(3,38,28,0.1);--border2:rgba(3,38,28,0.18);
  --text:var(--dark-green);--text2:#2d5040;--text3:var(--green-action-800);--active:var(--hero-bg);
  --red:#b83228;--red-dim:rgba(184,50,40,0.07);--red-border:rgba(184,50,40,0.18);
  --amber:#9a5200;--amber-dim:rgba(154,82,0,0.07);--amber-border:rgba(154,82,0,0.18);
  --blue:#1a4a8a;--blue-dim:rgba(26,74,138,0.07);--blue-border:rgba(26,74,138,0.18);
  --ok:var(--green-action-800);
  --font-display:'Sentient',Georgia,serif;--font-body:'Roobert',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh}

/* LOADING SCREEN */
.loading-screen{position:fixed;inset:0;z-index:9999;background:var(--dark-green);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s,visibility .4s}
.loading-screen.hidden{opacity:0;visibility:hidden}
.loading-logo{font-family:var(--font-display);font-size:32px;font-style:italic;color:var(--white);letter-spacing:-0.5px}
.loading-sub{font-family:var(--font-body);font-size:12px;font-weight:300;color:rgba(255,255,255,0.4);letter-spacing:0.3px}
.loading-bar{width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.loading-fill{height:100%;width:0%;background:var(--green-action-300);border-radius:2px;transition:width .3s}
.loading-status{font-family:var(--font-body);font-size:11px;font-weight:300;color:rgba(255,255,255,0.35)}
.loading-error{font-family:var(--font-body);font-size:13px;color:#ff9b92;max-width:400px;text-align:center;line-height:1.6;display:none}

/* HEADER */
.header{position:sticky;top:0;z-index:200;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--dark-green);border-bottom:1px solid rgba(255,255,255,0.06)}
.logo{display:flex;align-items:center;gap:16px}
.logo-name{font-family:var(--font-display);font-size:22px;font-style:italic;font-weight:400;color:var(--white);letter-spacing:-0.3px}
.logo-divider{width:1px;height:18px;background:rgba(255,255,255,0.2)}
.logo-sub{font-family:var(--font-body);font-size:11px;font-weight:300;color:rgba(255,255,255,0.5);letter-spacing:0.3px}
.header-right{display:flex;align-items:center;gap:16px}
.as-of{font-family:var(--font-body);font-size:11px;font-weight:300;color:rgba(255,255,255,0.4);text-align:right;line-height:1.7}
.refresh-btn{font-family:var(--font-body);font-size:11px;font-weight:400;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);padding:7px 16px;border-radius:20px;cursor:pointer;transition:all .15s}
.refresh-btn:hover{background:rgba(255,255,255,0.13);color:var(--white)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);background:var(--hero-bg)}
.stat{padding:20px 28px;border-right:1px solid rgba(255,255,255,0.07);transition:background .15s}
.stat:last-child{border-right:none}
.stat:hover{background:rgba(255,255,255,0.04)}
.stat-val{font-family:var(--font-display);font-size:42px;font-weight:700;line-height:1;letter-spacing:-2px;color:var(--white)}
.stat-val.red{color:#ff7b6e}.stat-val.amber{color:#ffbe5c}.stat-val.green{color:var(--green-action-300)}
.stat-label{font-family:var(--font-body);font-size:10px;font-weight:400;color:rgba(255,255,255,0.45);margin-top:5px;letter-spacing:0.3px}

/* LAYOUT */
.main{display:grid;grid-template-columns:238px 1fr;min-height:calc(100vh - 130px)}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);padding:18px 0;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto;background:var(--primary-300)}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:var(--primary-500);border-radius:2px}
.sidebar-heading{font-family:var(--font-body);font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;padding:10px 18px 5px}
.sidebar-divider{height:1px;background:var(--border);margin:10px 0}
.filter-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 18px;background:none;border:none;color:var(--text2);font-family:var(--font-body);font-size:13px;font-weight:400;cursor:pointer;text-align:left;transition:all .12s;position:relative}
.filter-btn:hover{background:rgba(3,38,28,0.05);color:var(--text)}
.filter-btn.active{background:rgba(3,38,28,0.08);color:var(--dark-green);font-weight:500}
.filter-btn.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;background:var(--hero-bg);border-radius:0 2px 2px 0}
.filter-count{font-family:var(--font-body);font-size:11px;font-weight:500;background:rgba(3,38,28,0.07);padding:2px 8px;border-radius:20px;color:var(--text3)}
.filter-btn.active .filter-count{background:rgba(33,64,55,0.12);color:var(--hero-bg)}
.owner-dot{width:7px;height:7px;border-radius:50%;margin-right:9px;flex-shrink:0}

/* LIST PANE */
.list-pane{display:flex;flex-direction:column;height:calc(100vh - 62px);position:sticky;top:62px;overflow:hidden}
.list-header{padding:16px 24px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--white);flex-shrink:0}
.list-title{font-family:var(--font-display);font-size:18px;font-weight:400;font-style:italic;color:var(--text)}
.list-count{font-family:var(--font-body);font-size:11px;font-weight:400;color:var(--text3)}
.sort-bar{display:flex;align-items:center;gap:6px;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--primary-300);flex-shrink:0}
.sort-label{font-family:var(--font-body);font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-right:4px}
.sort-btn{font-family:var(--font-body);font-size:11px;font-weight:400;color:var(--text2);background:var(--white);border:1px solid var(--border2);padding:5px 14px;border-radius:20px;cursor:pointer;transition:all .12s}
.sort-btn:hover{color:var(--dark-green);border-color:var(--hero-bg)}
.sort-btn.active{background:var(--hero-bg);color:var(--white);border-color:var(--hero-bg)}
.deal-scroll{overflow-y:auto;flex:1}
.deal-scroll::-webkit-scrollbar{width:3px}.deal-scroll::-webkit-scrollbar-thumb{background:var(--primary-500);border-radius:2px}

/* DEAL CARD */
.deal-card{padding:14px 24px;border-bottom:1px solid var(--border);cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;background:var(--white);transition:background .12s;position:relative}
.deal-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .12s}
.deal-card:hover{background:var(--primary-200)}.deal-card:hover::before{background:var(--primary-500)}
.deal-card.selected{background:var(--primary-400)}.deal-card.selected::before{background:var(--hero-bg)}
.deal-addr{font-family:var(--font-body);font-size:13px;font-weight:500;line-height:1.35;color:var(--dark-green)}
.deal-meta{font-family:var(--font-body);font-size:11px;font-weight:300;color:var(--text3);margin-top:3px;line-height:1.5}
.deal-flags-preview{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.flag-chip{font-family:var(--font-body);font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;letter-spacing:0.1px}
.chip-BLOCKER{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}
.chip-RISK{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)}
.chip-WATCH{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border)}
.score-badge{font-family:var(--font-display);font-size:14px;font-weight:700;padding:3px 10px;border-radius:8px;white-space:nowrap;letter-spacing:-0.5px}
.score-critical{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}
.score-high{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)}
.score-medium{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border)}
.score-low{background:rgba(3,38,28,0.05);color:var(--text3);border:1px solid var(--border)}
.sent-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.sent-Green{background:var(--ok)}.sent-Red{background:var(--red)}.sent-Yellow{background:var(--amber)}

/* DETAIL PANEL */
.detail-panel{display:none;position:fixed;right:0;top:62px;width:430px;height:calc(100vh - 62px);background:var(--white);border-left:1px solid var(--border2);overflow-y:auto;z-index:100;animation:slideIn .22s cubic-bezier(.16,1,.3,1);box-shadow:-6px 0 30px rgba(3,38,28,0.1)}
.detail-panel::-webkit-scrollbar{width:3px}.detail-panel::-webkit-scrollbar-thumb{background:var(--primary-500);border-radius:2px}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.detail-header{padding:24px 24px 22px;border-bottom:1px solid var(--border);background:var(--hero-bg);position:relative}
.detail-close{position:absolute;top:18px;right:18px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);width:28px;height:28px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.detail-close:hover{background:rgba(255,255,255,0.2);color:var(--white)}
.detail-addr{font-family:var(--font-display);font-size:16px;font-weight:400;font-style:italic;line-height:1.3;color:var(--white);padding-right:44px}
.detail-meta{font-family:var(--font-body);font-size:11px;font-weight:300;color:rgba(255,255,255,0.5);margin-top:8px;line-height:1.7}
.detail-score-row{display:flex;align-items:center;gap:16px;margin-top:18px}
.score-big{font-family:var(--font-display);font-size:48px;font-weight:700;letter-spacing:-2px;line-height:1}
.score-big.red{color:#ff9b92}.score-big.amber{color:#ffcc77}.score-big.blue{color:#93c5fd}.score-big.green{color:var(--green-action-300)}
.score-big-label{font-family:var(--font-body);font-size:9px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1.2px;margin-top:5px}
.sentiment-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);padding:8px 14px;border-radius:20px}
.sentiment-label{font-family:var(--font-body);font-size:11px;font-weight:400;color:rgba(255,255,255,0.65)}
.detail-section{padding:20px 24px;border-bottom:1px solid var(--border)}
.detail-section-title{font-family:var(--font-body);font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
.flag-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.flag-row:last-child{border-bottom:none}
.flag-pill{font-family:var(--font-body);font-size:9px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:0.3px;text-transform:uppercase;flex-shrink:0;margin-top:2px}
.pill-BLOCKER{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border)}
.pill-RISK{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-border)}
.pill-WATCH{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-border)}
.flag-label{font-family:var(--font-body);font-size:13px;font-weight:500;line-height:1.3;color:var(--text)}
.flag-detail{font-family:var(--font-body);font-size:11.5px;font-weight:300;color:var(--text3);margin-top:3px;line-height:1.5}
.mgr-note-box{background:var(--primary-300);border-radius:10px;padding:14px 16px;border-left:3px solid var(--hero-bg)}
.mgr-note-label{font-family:var(--font-body);font-size:9px;font-weight:600;color:var(--hero-bg);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.mgr-note-text{font-family:var(--font-body);font-size:13px;font-weight:300;color:var(--text2);line-height:1.6}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:280px;gap:10px}
.empty-icon{font-size:28px}.empty-text{font-family:var(--font-body);font-size:11px;color:var(--text3)}
.no-flags{font-family:var(--font-body);font-size:12px;color:var(--ok);display:flex;align-items:center;gap:8px}
.oc-0{background:var(--hero-bg)}.oc-1{background:var(--blue)}.oc-2{background:#7c3aed}.oc-3{background:var(--amber)}.oc-4{background:var(--red)}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.deal-card{animation:fadeUp .2s ease both}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">truehold</div>
  <div class="loading-sub">Deal Risk Dashboard</div>
  <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
  <div class="loading-status" id="loadingStatus">Connecting to Google Sheets…</div>
  <div class="loading-error" id="loadingError"></div>
</div>

<div class="header">
  <div class="logo">
    <span class="logo-name">truehold</span>
    <span class="logo-divider"></span>
    <span class="logo-sub">Deal Risk Dashboard</span>
  </div>
  <div class="header-right">
    <div class="as-of" id="asOf"></div>
    <button class="refresh-btn" onclick="location.reload()"><span class="live-dot"></span>Live · Refresh</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-heading">View</div>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All Deals <span class="filter-count" id="cnt-all">—</span></button>
    <button class="filter-btn" data-filter="critical" onclick="setFilter('critical',this)">🔴 Critical Risk <span class="filter-count" id="cnt-critical">—</span></button>
    <button class="filter-btn" data-filter="blockers" onclick="setFilter('blockers',this)">⛔ Has Blockers <span class="filter-count" id="cnt-blockers">—</span></button>
    <button class="filter-btn" data-filter="thisweek" onclick="setFilter('thisweek',this)">📅 Closing This Week <span class="filter-count" id="cnt-thisweek">—</span></button>
    <button class="filter-btn" data-filter="atRisk" onclick="setFilter('atRisk',this)">⚠️ Any Risk Flag <span class="filter-count" id="cnt-atRisk">—</span></button>
    <button class="filter-btn" data-filter="clean" onclick="setFilter('clean',this)">✅ No Issues <span class="filter-count" id="cnt-clean">—</span></button>
    <div class="sidebar-divider"></div>
    <div class="sidebar-heading">TM Owner</div>
    <div id="ownerFilters"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-heading">Product</div>
    <button class="filter-btn" data-filter="vacant" onclick="setFilter('vacant',this)">DA — Vacant <span class="filter-count" id="cnt-vacant">—</span></button>
    <button class="filter-btn" data-filter="leased" onclick="setFilter('leased',this)">DA — Leased <span class="filter-count" id="cnt-leased">—</span></button>
    <button class="filter-btn" data-filter="slb" onclick="setFilter('slb',this)">Sale-Leaseback <span class="filter-count" id="cnt-slb">—</span></button>
  </div>
  <div class="list-pane">
    <div class="list-header">
      <div class="list-title" id="listTitle">All Deals</div>
      <div class="list-count" id="listCount"></div>
    </div>
    <div class="sort-bar">
      <span class="sort-label">Sort</span>
      <button class="sort-btn active" onclick="setSort('score',this)">Risk Score ↓</button>
      <button class="sort-btn" onclick="setSort('close',this)">Close Date</button>
      <button class="sort-btn" onclick="setSort('blockers',this)">Blockers</button>
    </div>
    <div class="deal-scroll" id="dealListContainer"></div>
  </div>
</div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-addr" id="dp-addr"></div>
    <div class="detail-meta" id="dp-meta"></div>
    <div class="detail-score-row">
      <div>
        <div class="score-big" id="dp-score"></div>
        <div class="score-big-label">Risk Score</div>
      </div>
      <div class="sentiment-badge" id="dp-sentiment-badge"></div>
    </div>
  </div>
  <div class="detail-section">
    <div class="detail-section-title">Risk Flags</div>
    <div id="dp-flags"></div>
  </div>
  <div class="detail-section" id="dp-mgr-section" style="display:none">
    <div class="detail-section-title">Manager Notes</div>
    <div class="mgr-note-box">
      <div class="mgr-note-label">Latest Update</div>
      <div class="mgr-note-text" id="dp-mgr"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG — Change this URL to point at any published Google Sheet
// ══════════════════════════════════════════════════════════════════
const SHEET_ID = '2PACX-1vTSzDfLg-lA98M90-9j252hgIpGsoCYZJsYN8O5EY4fw1TqbhnW5CvBu8fmKjCxyRdUDLxbCFlyiPN0';
const SHEET_REAL_ID = '1wJ1H8FzMaV9aipzgEQgzXaPgGage5DmtF6V9Dsn867Y';
const SHEET_GID = '88360849';
const SHEET_CSV_URL  = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv&single=true&gid=0`;
const SHEET_HTML_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pubhtml?single=true&gid=0`;
// Also try the export endpoint using the real sheet ID (works for publicly shared sheets)
const SHEET_EXPORT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_REAL_ID}/export?format=csv&gid=${SHEET_GID}`;

// ══════════════════════════════════════════════════════════════════
// CSV PARSER (handles quoted fields, newlines inside quotes, etc.)
// ══════════════════════════════════════════════════════════════════
function parseCSV(text) {
  const rows = []; let row = []; let field = ''; let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field.trim()); field = ''; }
      else if (c === '\n' || (c === '\r' && next === '\n')) {
        row.push(field.trim()); field = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
        if (c === '\r') i++;
      } else { field += c; }
    }
  }
  row.push(field.trim());
  if (row.length > 1 || row[0] !== '') rows.push(row);
  return rows;
}

// ══════════════════════════════════════════════════════════════════
// DATE & HELPER UTILITIES
// ══════════════════════════════════════════════════════════════════
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function parseDate(s) {
  if (!s) return null;
  const parts = s.split('/');
  if (parts.length < 3) return null;
  let [m, d, y] = parts.map(Number);
  if (y < 100) y += 2000;
  const dt = new Date(y, m - 1, d); dt.setHours(0,0,0,0);
  return isNaN(dt.getTime()) ? null : dt;
}

function daysOut(closeStr) {
  const d = parseDate(closeStr);
  return d ? Math.round((d - TODAY) / 86400000) : 999;
}

function mgrNoteAge(notes) {
  if (!notes) return null;
  const m = notes.trim().match(/^(\d{1,2})[\/.](\d{1,2})\b/);
  if (!m) return null;
  const month = parseInt(m[1]), day = parseInt(m[2]);
  try {
    const noteDate = new Date(TODAY.getFullYear(), month - 1, day);
    noteDate.setHours(0,0,0,0);
    return Math.round((TODAY - noteDate) / 86400000);
  } catch { return null; }
}

function countExtensions(keynotes) {
  return (keynotes.match(/extension|extended|ext\b|coe ext/gi) || []).length;
}

function hasRemorse(keynotes) {
  return /remorse|pulling back|hesitation|buyers?\s*remorse/i.test(keynotes);
}

// ══════════════════════════════════════════════════════════════════
// RISK SCORING ENGINE (mirrors score_pipeline.py exactly)
// ══════════════════════════════════════════════════════════════════
function scoreDeal(row, col) {
  const g = (name) => {
    const idx = col[name];
    return (idx !== undefined && idx < row.length) ? row[idx].trim() : '';
  };

  const dealName = g('Deal: Deal Name');
  if (!dealName) return null;

  const closeStr    = g('Actual Close Date');
  const dout        = daysOut(closeStr);
  const owner       = g('Deal: Owner Name');
  const product     = g('Product Type');
  const sentiment   = g('Deal Sentiment');
  const mgrNotes    = g('Manager Notes');
  const keynotes    = g('Deal Keynotes');

  const titleStatus  = g('Title Commitment Status');
  const hudStatus    = g('Final HUD Pre-Close Review Status');
  const leaseStatus  = g('Lease Status');
  const counseling   = g('3P Counseling Status');
  const sellerInfo   = g('Sellers Information Status');
  const inspection   = g('Inspection Status');
  const tenantApp    = g('Tenant Application Status');
  const markupTitle  = g('Marked-Up Title Commitment Status');
  const fwtStatus    = g('Final Walkthrough Status');
  const closingFunds = g('Closing Funds Status');
  const hoaStatus    = g('HOA Pre-Close Review Status');
  const posStatus    = g('Point of Sale Inspection Status');

  let score = 0, flags = [], blockers = 0;

  // ── BLOCKERS ──
  if (titleStatus === 'Pending' && dout <= 5) {
    flags.push({type:'BLOCKER',label:'Short sale approval pending',detail:'Title has not confirmed approval — deal cannot close without it'});
    score += 30; blockers++;
  } else if (titleStatus === 'Pending' && dout > 5) {
    flags.push({type:'BLOCKER',label:'Unresolved title issue (lien/judgment)',detail:'Liens, judgments, or foreclosure items require clearance before close'});
    score += 15; blockers++;
  }

  if (hudStatus === 'Manager Issue Identified' || hudStatus === 'Issue Identified') {
    flags.push({type:'BLOCKER',label:'HUD issue flagged by manager',detail:`Status: ${hudStatus}`});
    score += 20; blockers++;
  }

  if (product.includes('Sale-Leaseback')) {
    if (counseling === 'Required') {
      flags.push({type:'BLOCKER',label:'3rd-party counseling required but not complete',detail:'Sale-leaseback cannot close without counseling completion'});
      score += 15; blockers++;
    } else if (counseling === 'Disclosure Signed') {
      flags.push({type:'BLOCKER',label:'3rd-party counseling required but not complete',detail:'Sale-leaseback cannot close without counseling completion'});
      score += 10; blockers++;
    }
  }

  if (fwtStatus === 'Requires Fee') {
    flags.push({type:'BLOCKER',label:'Final walkthrough requires fee resolution',detail:'Property left items — trash fee must be agreed before closing'});
    score += 15; blockers++;
  }

  if (inspection === 'Notice to be Sent' && dout <= 14) {
    flags.push({type:'BLOCKER',label:'Inspection cancelled',detail:'Needs reschedule before deal can progress'});
    score += 15; blockers++;
  }

  if (sentiment === 'Red' && hasRemorse(keynotes)) {
    flags.push({type:'BLOCKER',label:'Seller hesitation / remorse signal',detail:'Notes indicate seller may be pulling back'});
    score += 20; blockers++;
  }

  // ── RISK flags ──
  let riskPts = 0;

  if (hudStatus !== 'Complete' && dout <= 7 && hudStatus !== 'Manager Issue Identified' && hudStatus !== 'Issue Identified') {
    flags.push({type:'RISK',label:`HUD not complete — closing in ${dout}d`,detail:'HUD must be reviewed and approved before closing funds are released'});
    riskPts += 15;
  } else if (hudStatus === 'Pending Docs' && dout > 7 && dout <= 14) {
    flags.push({type:'RISK',label:`HUD pending docs — closing in ${dout}d`,detail:'HUD must be reviewed and approved before closing funds are released'});
    riskPts += 8;
  }

  if (!['Completed','','N/A'].includes(sellerInfo) && dout <= 7) {
    flags.push({type:'RISK',label:`Seller info not completed — closing in ${dout}d`,detail:`Status: ${sellerInfo}`});
    riskPts += 10;
  }

  if (titleStatus === 'Pending' && dout <= 5) {
    flags.push({type:'RISK',label:'Title commitment pending — closing within 5 days',detail:'Title must be cleared before funds can be requested'});
    riskPts += 10;
  }

  if (leaseStatus.includes('Renewal Required')) {
    flags.push({type:'RISK',label:`Lease issue: ${leaseStatus}`,detail:'Lease must be approved before deal can close — possible tenant or documentation risk'});
    riskPts += 8;
  } else if (leaseStatus.includes('Additional Info')) {
    flags.push({type:'RISK',label:`Lease issue: ${leaseStatus}`,detail:'Lease must be approved before deal can close — possible tenant or documentation risk'});
    riskPts += 8;
  } else if (leaseStatus === 'Requires Review/Modifications') {
    flags.push({type:'RISK',label:'Lease issue: Requires Review/Modifications',detail:'Lease must be approved before deal can close — possible tenant or documentation risk'});
    riskPts += 10;
  }

  if (tenantApp === 'Pending More Info') {
    flags.push({type:'RISK',label:'Tenant application: Pending More Info',detail:'Tenant approval is required for leased acquisitions'});
    riskPts += 8;
  } else if (tenantApp === 'Invitation Sent' && dout <= 14) {
    flags.push({type:'RISK',label:'Tenant application: Invitation Sent',detail:'Tenant approval is required for leased acquisitions'});
    riskPts += 5;
  }

  if (inspection.includes('Counter') && dout <= 14) {
    flags.push({type:'RISK',label:'Open inspection negotiation / counter',detail:'Seller has countered — resolution needed before close'});
    riskPts += 10;
  }

  const extCount = countExtensions(keynotes);
  if (extCount >= 10) {
    flags.push({type:'RISK',label:`Multiple COE extensions (${extCount}+)`,detail:'Repeated delays are a predictor of fallout — deal momentum is stalling'});
    riskPts += 10;
  }

  if (closingFunds === 'Pending' && dout <= 3) {
    flags.push({type:'RISK',label:'Closing funds not yet requested',detail:'Funds must be requested before closing can proceed'});
    riskPts += 8;
  }

  if (dout === 0) riskPts = Math.floor(riskPts * 1.5);
  score += riskPts;

  // ── WATCH flags ──
  if (!['Completed','N/A'].includes(markupTitle) && dout <= 14) {
    flags.push({type:'WATCH',label:'Marked-up title commitment not uploaded',detail:'Required for pre-close HUD review'});
    score += 3;
  }

  if (['Pending Docs','Pending Review','Reviewed, pending RM'].includes(hoaStatus)) {
    flags.push({type:'WATCH',label:'HOA docs pending',detail:'Required before close for HOA properties'});
    score += 3;
  }

  if (posStatus === 'Completed - Non-compliant') {
    flags.push({type:'WATCH',label:'POS inspection non-compliant (accepted)',detail:'May create holdback, escrow, or post-close liability'});
    score += 3;
  }

  const noteAge = mgrNoteAge(mgrNotes);
  if (noteAge !== null && noteAge >= 7 && dout <= 7) {
    flags.push({type:'WATCH',label:`Manager note is ${noteAge}d old on imminent close`,detail:'Last manager check-in may not reflect current status'});
    score += 5;
  }

  if (/extension|extended/i.test(keynotes) && dout <= 21 && extCount < 10) {
    flags.push({type:'WATCH',label:'Close date extended',detail:'Deal has been pushed at least once — monitor for further slippage'});
    score += 3;
  }

  if (sentiment === 'Red') score += 5;
  if (dout < 0) score += 10;

  return { deal: dealName, owner, close_date: closeStr, days_out: dout, sentiment, product, risk_score: score, blockers, flags, mgr_notes: mgrNotes };
}

// ══════════════════════════════════════════════════════════════════
// DASHBOARD RENDERING (same as static version)
// ══════════════════════════════════════════════════════════════════
let PIPELINE = [], OWNERS = [], currentFilter = 'all', currentSort = 'score', selectedOwner = null, selectedDeal = null;
const OC = ['oc-0','oc-1','oc-2','oc-3','oc-4'];
const ownerColorMap = {};

function getScoreClass(s) { return s>=80?'score-critical':s>=40?'score-high':s>=15?'score-medium':'score-low'; }
function scoreBigClass(s) { return s>=80?'red':s>=40?'amber':s>0?'blue':'green'; }

function filterDeals() {
  let d = [...PIPELINE];
  if (selectedOwner) d = d.filter(x => x.owner === selectedOwner);
  switch (currentFilter) {
    case 'critical': d = d.filter(x => x.risk_score >= 80); break;
    case 'blockers': d = d.filter(x => x.blockers > 0); break;
    case 'thisweek': d = d.filter(x => x.days_out >= 0 && x.days_out <= 7); break;
    case 'atRisk': d = d.filter(x => x.risk_score > 0); break;
    case 'clean': d = d.filter(x => x.risk_score === 0); break;
    case 'vacant': d = d.filter(x => x.product.includes('Vacant')); break;
    case 'leased': d = d.filter(x => x.product.includes('Leased')); break;
    case 'slb': d = d.filter(x => x.product.includes('Sale-Leaseback')); break;
  }
  if (currentSort === 'score') d.sort((a, b) => b.risk_score - a.risk_score || a.days_out - b.days_out);
  if (currentSort === 'close') d.sort((a, b) => a.days_out - b.days_out);
  if (currentSort === 'blockers') d.sort((a, b) => b.blockers - a.blockers || b.risk_score - a.risk_score);
  return d;
}

function renderStats() {
  const a = PIPELINE;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-val red">${a.filter(d=>d.risk_score>=80).length}</div><div class="stat-label">Critical Risk</div></div>
    <div class="stat"><div class="stat-val red">${a.filter(d=>d.blockers>0).length}</div><div class="stat-label">Has Blockers</div></div>
    <div class="stat"><div class="stat-val amber">${a.filter(d=>d.days_out>=0&&d.days_out<=7).length}</div><div class="stat-label">Closing This Week</div></div>
    <div class="stat"><div class="stat-val amber">${a.filter(d=>d.days_out>=0&&d.days_out<=7&&d.risk_score>0).length}</div><div class="stat-label">At Risk This Week</div></div>
    <div class="stat"><div class="stat-val green">${a.filter(d=>d.risk_score===0).length}</div><div class="stat-label">No Issues</div></div>`;
}

function updateCounts() {
  const a = PIPELINE;
  document.getElementById('cnt-all').textContent = a.length;
  document.getElementById('cnt-critical').textContent = a.filter(d => d.risk_score >= 80).length;
  document.getElementById('cnt-blockers').textContent = a.filter(d => d.blockers > 0).length;
  document.getElementById('cnt-thisweek').textContent = a.filter(d => d.days_out >= 0 && d.days_out <= 7).length;
  document.getElementById('cnt-atRisk').textContent = a.filter(d => d.risk_score > 0).length;
  document.getElementById('cnt-clean').textContent = a.filter(d => d.risk_score === 0).length;
  document.getElementById('cnt-vacant').textContent = a.filter(d => d.product.includes('Vacant')).length;
  document.getElementById('cnt-leased').textContent = a.filter(d => d.product.includes('Leased')).length;
  document.getElementById('cnt-slb').textContent = a.filter(d => d.product.includes('Sale-Leaseback')).length;
}

function renderOwnerFilters() {
  document.getElementById('ownerFilters').innerHTML = OWNERS.map((o, i) => {
    const n = PIPELINE.filter(d => d.owner === o).length;
    return `<button class="filter-btn" onclick="toggleOwner('${o.replace(/'/g,"\\'")}',this)" id="ob-${i}">
      <span style="display:flex;align-items:center;"><span class="owner-dot ${OC[i % 5]}"></span>${o.split(' ')[0]}</span>
      <span class="filter-count">${n}</span></button>`;
  }).join('');
}

function toggleOwner(owner, btn) {
  selectedOwner = selectedOwner === owner ? null : owner;
  document.querySelectorAll('[id^="ob-"]').forEach(b => b.classList.remove('active'));
  if (selectedOwner) btn.classList.add('active');
  renderList();
}

function renderList() {
  const deals = filterDeals();
  const c = document.getElementById('dealListContainer');
  document.getElementById('listCount').textContent = `${deals.length} deal${deals.length !== 1 ? 's' : ''}`;
  if (!deals.length) {
    c.innerHTML = `<div class="empty-state"><div class="empty-icon">✓</div><div class="empty-text">No deals match</div></div>`;
    return;
  }
  c.innerHTML = deals.map((d, i) => {
    const b = d.flags.filter(f => f.type === 'BLOCKER').length;
    const r = d.flags.filter(f => f.type === 'RISK').length;
    const w = d.flags.filter(f => f.type === 'WATCH').length;
    const chips = [
      b > 0 ? `<span class="flag-chip chip-BLOCKER">${b} blocker${b > 1 ? 's' : ''}</span>` : '',
      r > 0 ? `<span class="flag-chip chip-RISK">${r} risk</span>` : '',
      w > 0 ? `<span class="flag-chip chip-WATCH">${w} watch</span>` : '',
      d.risk_score === 0 ? `<span style="font-size:10px;color:var(--ok);font-family:var(--font-body);">✓ clear</span>` : ''
    ].join('');
    const dl = d.days_out < 0 ? `${Math.abs(d.days_out)}d ago` : d.days_out === 0 ? 'TODAY' : `${d.days_out}d`;
    return `<div class="deal-card" id="card-${i}" onclick="selectDeal(${i})" style="animation-delay:${i * 12}ms">
      <div>
        <div class="deal-addr">${d.deal.replace(/ US$/, '').replace(/, United States$/, '')}</div>
        <div class="deal-meta"><span class="sent-dot sent-${d.sentiment}"></span>${dl} · ${d.close_date} &nbsp;·&nbsp; ${d.owner.split(' ')[0]} · ${d.product.replace('Direct Acq - ', '')}</div>
        <div class="deal-flags-preview">${chips}</div>
      </div>
      <div>${d.risk_score > 0 ? `<span class="score-badge ${getScoreClass(d.risk_score)}">${d.risk_score}</span>` : ''}</div>
    </div>`;
  }).join('');
}

function selectDeal(idx) {
  const deals = filterDeals();
  const d = deals[idx];
  selectedDeal = d.deal;
  document.querySelectorAll('.deal-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`card-${idx}`).classList.add('selected');
  document.getElementById('dp-addr').textContent = d.deal.replace(/ US$/, '').replace(/, United States$/, '');
  document.getElementById('dp-meta').textContent = `${d.owner}  ·  ${d.product}  ·  Closes ${d.close_date}  ·  ${d.days_out < 0 ? Math.abs(d.days_out) + 'd ago' : d.days_out === 0 ? 'Today' : d.days_out + 'd out'}`;
  const sc = document.getElementById('dp-score');
  sc.textContent = d.risk_score;
  sc.className = `score-big ${scoreBigClass(d.risk_score)}`;
  document.getElementById('dp-sentiment-badge').innerHTML = `<span class="sent-dot sent-${d.sentiment}" style="width:8px;height:8px;"></span><span class="sentiment-label">${d.sentiment}</span>`;
  document.getElementById('dp-flags').innerHTML = d.flags.length === 0
    ? `<div class="no-flags">✓ No risk flags identified</div>`
    : d.flags.map(f => `<div class="flag-row"><span class="flag-pill pill-${f.type}">${f.type}</span><div><div class="flag-label">${f.label}</div><div class="flag-detail">${f.detail}</div></div></div>`).join('');
  if (d.mgr_notes) {
    document.getElementById('dp-mgr-section').style.display = 'block';
    document.getElementById('dp-mgr').textContent = d.mgr_notes;
  } else { document.getElementById('dp-mgr-section').style.display = 'none'; }
  document.getElementById('detailPanel').style.display = 'block';
}

function closeDetail() {
  document.getElementById('detailPanel').style.display = 'none';
  document.querySelectorAll('.deal-card').forEach(c => c.classList.remove('selected'));
  selectedDeal = null;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedOwner = null;
  document.querySelectorAll('[id^="ob-"]').forEach(b => b.classList.remove('active'));
  const labels = { all: 'All Deals', critical: 'Critical Risk', blockers: 'Has Blockers', thisweek: 'Closing This Week', atRisk: 'Any Risk Flag', clean: 'No Issues', vacant: 'DA — Vacant', leased: 'DA — Leased', slb: 'Sale-Leaseback' };
  document.getElementById('listTitle').textContent = labels[filter] || filter;
  renderList();
}

function setSort(sort, btn) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ══════════════════════════════════════════════════════════════════
// FETCH → PARSE → SCORE → RENDER
// ══════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════
// FETCH STRATEGIES
// ══════════════════════════════════════════════════════════════════

// Strategy 1: CSV (cleanest)
async function fetchCSV() {
  // Try the direct export URL first (works for publicly shared sheets)
  let resp;
  try {
    resp = await fetch(SHEET_EXPORT_URL);
    if (!resp.ok) throw new Error(`Export ${resp.status}`);
  } catch (e) {
    // Fall back to published CSV URL
    resp = await fetch(SHEET_CSV_URL);
    if (!resp.ok) throw new Error(`CSV ${resp.status}`);
  }
  const text = await resp.text();
  if (text.includes('<!DOCTYPE') || text.includes('<html')) throw new Error('Got HTML instead of CSV');
  return parseCSV(text);
}

// Strategy 2: pubhtml (scrape the HTML table Google renders)
async function fetchPubHTML() {
  const resp = await fetch(SHEET_HTML_URL);
  if (!resp.ok) throw new Error(`pubhtml ${resp.status}`);
  const html = await resp.text();
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const table = doc.querySelector('table');
  if (!table) throw new Error('No table found in pubhtml');
  const rows = [];
  table.querySelectorAll('tr').forEach(tr => {
    const cells = [];
    tr.querySelectorAll('td, th').forEach(td => cells.push(td.textContent.trim()));
    if (cells.length > 1 || cells[0] !== '') rows.push(cells);
  });
  return rows;
}

// Strategy 3: JSONP via Google Visualization API (another angle)
function fetchVizJSON() {
  return new Promise((resolve, reject) => {
    const cbName = '_sheetCB_' + Date.now();
    const script = document.createElement('script');
    const sheetKey = SHEET_REAL_ID;
    script.src = `https://docs.google.com/spreadsheets/d/${sheetKey}/gviz/tq?tqx=responseHandler:${cbName}&tq=SELECT%20*&gid=${SHEET_GID}`;

    window[cbName] = function(response) {
      try {
        delete window[cbName];
        script.remove();
        if (!response || !response.table) { reject(new Error('No table in gviz response')); return; }
        const t = response.table;
        const headers = t.cols.map(c => c.label || '');
        const rows = [headers];
        t.rows.forEach(r => {
          rows.push(r.c.map(cell => {
            if (!cell) return '';
            if (cell.f) return cell.f; // formatted value
            if (cell.v != null) return String(cell.v);
            return '';
          }));
        });
        resolve(rows);
      } catch (e) { reject(e); }
    };

    script.onerror = () => { delete window[cbName]; reject(new Error('gviz script load failed')); };
    setTimeout(() => { if (window[cbName]) { delete window[cbName]; reject(new Error('gviz timeout')); } }, 15000);
    document.head.appendChild(script);
  });
}

// ══════════════════════════════════════════════════════════════════
// MAIN LOAD — tries strategies in order
// ══════════════════════════════════════════════════════════════════
async function loadFromSheet() {
  const fill = document.getElementById('loadingFill');
  const status = document.getElementById('loadingStatus');
  const errorEl = document.getElementById('loadingError');

  try {
    fill.style.width = '15%';
    status.textContent = 'Connecting to Google Sheets…';

    let rows = null;
    let method = '';

    // Try CSV first
    try {
      status.textContent = 'Fetching CSV export…';
      rows = await fetchCSV();
      method = 'CSV';
    } catch (e1) {
      console.warn('CSV failed:', e1.message);
      // Try pubhtml scraping
      try {
        status.textContent = 'Trying HTML export…';
        fill.style.width = '25%';
        rows = await fetchPubHTML();
        method = 'pubhtml';
      } catch (e2) {
        console.warn('pubhtml failed:', e2.message);
        // Try Google Visualization JSON
        try {
          status.textContent = 'Trying Visualization API…';
          fill.style.width = '35%';
          rows = await fetchVizJSON();
          method = 'gviz';
        } catch (e3) {
          console.warn('gviz failed:', e3.message);
          throw new Error(
            `Could not fetch the Google Sheet.\n\n` +
            `Tried 3 methods:\n` +
            `• CSV export: ${e1.message}\n` +
            `• HTML scrape: ${e2.message}\n` +
            `• Visualization API: ${e3.message}\n\n` +
            `Make sure the sheet is published (File → Share → Publish to web) and you're not on a restricted network.`
          );
        }
      }
    }

    fill.style.width = '50%';
    status.textContent = 'Parsing spreadsheet…';
    console.log(`Loaded via ${method}: ${rows.length} rows`);

    if (rows.length < 2) throw new Error('Sheet appears empty or has no data rows.');

    // For gviz, the first row with the actual header labels might be row 0 or row 1
    // Detect: if row 0 looks like headers (has "Deal: Deal Name"), use it; otherwise check row 1
    let headerRowIdx = 0;
    if (!rows[0].includes('Deal: Deal Name') && rows.length > 1 && rows[1].includes('Deal: Deal Name')) {
      headerRowIdx = 1;
    }

    const headers = rows[headerRowIdx];
    const col = {};
    headers.forEach((h, i) => { if (h) col[h] = i; });

    // Validate required columns
    const required = ['Deal: Deal Name', 'Actual Close Date', 'Deal: Owner Name', 'Product Type'];
    const missing = required.filter(r => col[r] === undefined);
    if (missing.length) {
      console.log('Available columns:', headers.filter(h => h));
      throw new Error(`Missing columns: ${missing.join(', ')}.\n\nFound: ${headers.filter(h=>h).slice(0,10).join(', ')}…\n\nCheck that the Google Sheet headers match the Salesforce export exactly.`);
    }

    fill.style.width = '75%';
    status.textContent = `Scoring ${rows.length - 1 - headerRowIdx} deals…`;

    const scored = [];
    for (let i = headerRowIdx + 1; i < rows.length; i++) {
      const result = scoreDeal(rows[i], col);
      if (result) scored.push(result);
    }
    scored.sort((a, b) => -a.risk_score + b.risk_score || a.days_out - b.days_out);

    fill.style.width = '95%';
    status.textContent = 'Rendering dashboard…';

    PIPELINE = scored;
    OWNERS = [...new Set(PIPELINE.map(d => d.owner))];
    OWNERS.forEach((o, i) => ownerColorMap[o] = OC[i % 5]);

    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('asOf').innerHTML = `<div>${dateStr}</div><div>${PIPELINE.length} active deals</div>`;

    renderStats();
    updateCounts();
    renderOwnerFilters();
    renderList();

    fill.style.width = '100%';
    await new Promise(r => setTimeout(r, 300));
    document.getElementById('loadingScreen').classList.add('hidden');

  } catch (err) {
    fill.style.width = '100%';
    fill.style.background = '#ff7b6e';
    status.textContent = 'Failed to load';
    errorEl.style.display = 'block';
    errorEl.style.whiteSpace = 'pre-wrap';
    errorEl.textContent = err.message;
    console.error('Dashboard load error:', err);
  }
}

function bootWithData(scored) {
  PIPELINE = scored;
  OWNERS = [...new Set(PIPELINE.map(d => d.owner))];
  OWNERS.forEach((o, i) => ownerColorMap[o] = OC[i % 5]);
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('asOf').innerHTML = `<div>${dateStr}</div><div>${PIPELINE.length} active deals</div>`;
  renderStats(); updateCounts(); renderOwnerFilters(); renderList();
}

// Render embedded data immediately
bootWithData(EMBEDDED_DATA);
document.getElementById('loadingScreen').classList.add('hidden');

// Then try live refresh in background
(async function tryLiveRefresh() {
  try {
    let rows = null;
    // Try CSV first
    try { rows = await fetchCSV(); } catch(e1) {
      try { rows = await fetchPubHTML(); } catch(e2) {
        try { rows = await fetchVizJSON(); } catch(e3) {
          console.log('Live refresh unavailable (offline or local file) — using embedded data');
          return;
        }
      }
    }

    if (!rows || rows.length < 2) return;

    let headerRowIdx = 0;
    if (!rows[0].includes('Deal: Deal Name') && rows.length > 1 && rows[1].includes('Deal: Deal Name')) headerRowIdx = 1;
    const headers = rows[headerRowIdx];
    const col = {};
    headers.forEach((h, i) => { if (h) col[h] = i; });
    const required = ['Deal: Deal Name', 'Actual Close Date', 'Deal: Owner Name', 'Product Type'];
    if (required.some(r => col[r] === undefined)) return;

    const scored = [];
    for (let i = headerRowIdx + 1; i < rows.length; i++) {
      const result = scoreDeal(rows[i], col);
      if (result) scored.push(result);
    }
    scored.sort((a, b) => -a.risk_score + b.risk_score || a.days_out - b.days_out);

    if (scored.length > 0) {
      bootWithData(scored);
      // Update header to show it's live
      document.querySelector('.refresh-btn').innerHTML = '<span class="live-dot"></span>Live · Refresh';
      console.log(`Live refresh: ${scored.length} deals scored from Google Sheet`);
    }
  } catch (err) {
    console.log('Background refresh failed:', err.message);
  }
})();
